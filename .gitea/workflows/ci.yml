name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: git.nl.cloud/*
      GONOSUMCHECK: git.nl.cloud/*
      GOINSECURE: git.nl.cloud
    steps:
      - uses: actions/checkout@v6
      - name: Configure Go private modules
        run: git config --global url."http://gitea:3000/".insteadOf "https://git.nl.cloud/"
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Test
        run: go test ./... -race -coverprofile=coverage.out
      - name: Check coverage
        run: |
          go install github.com/vladopajic/go-test-coverage/v2@latest
          go-test-coverage --config ./.testcoverage.yml
      - name: Download baseline coverage
        if: gitea.event_name == 'pull_request'
        uses: actions/download-artifact@v3
        with:
          name: coverage-baseline
          path: ./baseline
        continue-on-error: true
      - name: Compare coverage
        if: gitea.event_name == 'pull_request'
        run: |
          CURRENT=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $NF}' | tr -d '%')
          if [ -f ./baseline/coverage.out ]; then
            BASE=$(go tool cover -func=./baseline/coverage.out | grep "^total:" | awk '{print $NF}' | tr -d '%')
            echo "Base coverage: ${BASE}%"
            echo "Current coverage: ${CURRENT}%"
            if [ "$(echo "$CURRENT < $BASE" | bc -l)" -eq 1 ]; then
              echo "::error::Coverage decreased from ${BASE}% to ${CURRENT}%"
              exit 1
            fi
            echo "Coverage maintained or improved: ${BASE}% -> ${CURRENT}%"
          else
            echo "No baseline coverage found, skipping comparison"
            echo "Current coverage: ${CURRENT}%"
          fi
      - name: Upload coverage baseline
        if: gitea.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-baseline
          path: coverage.out
          retention-days: 90
      - name: Post coverage comment
        if: gitea.event_name == 'pull_request'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL: ${{ gitea.server_url }}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $NF}')
          curl -X POST "${GITEA_URL}/api/v1/repos/${{ gitea.repository }}/issues/${{ gitea.event.pull_request.number }}/comments" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"## Coverage Report\n\nTotal coverage: **${COVERAGE}**\"}"
