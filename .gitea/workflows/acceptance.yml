name: Acceptance Tests

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: tf-acceptance-tests
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      API_ENDPOINT: ${{ vars.API_ENDPOINT }}
      PORTAL_URL: ${{ vars.PORTAL_URL }}
      GOPRIVATE: go.frostmoln.internal/*
      GONOSUMCHECK: go.frostmoln.internal/*
      GOINSECURE: go.frostmoln.internal,git.sm.internal
      GIT_SSL_NO_VERIFY: "true"
      GIT_CONFIG_GLOBAL: /tmp/.gitconfig-ci
    steps:
      - uses: actions/checkout@v7
      # Go is baked into the anchor-runner image (GOTOOLCHAIN=auto matches
      # go.mod), so no actions/setup-go. The provider now imports
      # go.frostmoln.internal/oidc, so `go test` needs the private-module rewrite
      # (ci-runner token, git.sm.internal — the k3s dind runners NXDOMAIN on `gitea`).
      - name: Configure Go private modules
        env:
          GITEA_TOKEN: ${{ secrets.CI_GITEA_TOKEN }}
        run: |  # pragma: allowlist secret
          printf '[url "https://ci-runner:%s@git.sm.internal/frostmoln/"]\n  insteadOf = http://go.frostmoln.internal/\n  insteadOf = https://go.frostmoln.internal/\n  insteadOf = http://git.sm.internal/frostmoln/\n  insteadOf = https://git.sm.internal/frostmoln/\n' "$GITEA_TOKEN" > /tmp/.gitconfig-ci

      - name: Create test user and API key
        run: |
          set -euo pipefail
          RUN_ID="${{ gitea.run_id }}"
          EMAIL="tf-acctest-${RUN_ID}@test.nl.cloud"

          echo "Registering test user: ${EMAIL}"
          RESP=$(curl -s --fail-with-body -X POST "${API_ENDPOINT}/auth/register" \
            -H "Content-Type: application/json" \
            -H "Origin: ${PORTAL_URL}" \
            -d "{\"email\":\"${EMAIL}\",\"password\":\"AccTest!Secure2026#\",\"name\":\"TF AccTest ${RUN_ID}\"}")

          BEARER=$(echo "$RESP" | jq -r '.accessToken')
          if [ -z "$BEARER" ] || [ "$BEARER" = "null" ]; then
            echo "::error::Registration failed. Response: ${RESP}"
            exit 1
          fi
          echo "Test user registered successfully"

          echo "Creating API key"
          KEY_RESP=$(curl -s --fail-with-body -X POST "${API_ENDPOINT}/api-keys" \
            -H "Authorization: Bearer ${BEARER}" \
            -H "Content-Type: application/json" \
            -H "Origin: ${PORTAL_URL}" \
            -d '{"name":"tf-acctest-key","scopes":["compute:read","compute:write","storage:read","storage:write","network:read","network:write","billing:read","secrets:read","secrets:write"]}')

          API_KEY=$(echo "$KEY_RESP" | jq -r '.key')
          if [ -z "$API_KEY" ] || [ "$API_KEY" = "null" ]; then
            echo "::error::API key creation failed. Response: ${KEY_RESP}"
            exit 1
          fi
          echo "API key created successfully"

          echo "FROSTMOLN_API_KEY=${API_KEY}" >> $GITHUB_ENV
          echo "FROSTMOLN_API_ENDPOINT=${PORTAL_URL}/api" >> $GITHUB_ENV
          echo "TEST_BEARER_TOKEN=${BEARER}" >> $GITHUB_ENV

      - name: Run acceptance tests
        run: TF_ACC=1 go test -v -timeout 30m -count=1 ./internal/...
        env:
          FROSTMOLN_TEST_IMAGE_NAME: "Ubuntu 24.04"
          FROSTMOLN_TEST_FLAVOR_NAME: "nl.small"

      - name: Cleanup test user
        if: always()
        run: |
          curl -sf -X DELETE "${API_ENDPOINT}/me" \
            -H "Authorization: Bearer ${TEST_BEARER_TOKEN}" \
            -H "Origin: ${PORTAL_URL}" || echo "Cleanup: user may already be deleted"
