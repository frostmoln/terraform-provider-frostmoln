name: Pre-commit

on:
  pull_request:
    branches: [main]

jobs:
  # Job id `pre-commit` keeps the status context `Pre-commit / pre-commit
  # (pull_request)` -> no branch-protection change (ADR-0048).
  pre-commit:
    # Pinned to an immutable version tag, not @main (act-cache staleness,
    # ADR-0048). Renovate's gitea-tags manager bumps it.
    uses: frostmoln/workflows/.gitea/workflows/pre-commit.yml@v0.3.2
    secrets:
      CI_GITEA_TOKEN: ${{ secrets.CI_GITEA_TOKEN }}
